<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harki Phone - Final Desktop</title>
    <style>
        :root { --gold: #f1c40f; --dark: #000; --card: #0d0d0d; --red: #ff4757; --purple: #a29bfe; --green: #2ecc71; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: white; padding: 20px; }
        
        .led-header {
            position: relative; background: var(--card); border-radius: 20px;
            padding: 25px; text-align: center; overflow: hidden; margin-bottom: 25px;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }
        .led-header::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate-led 6s linear infinite; z-index: 0;
        }
        .led-header::after { content: ""; position: absolute; inset: 3px; background: var(--card); border-radius: 18px; z-index: 1; }
        .moving-title { position: relative; z-index: 2; margin: 0; font-size: 40px; color: var(--gold); text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); animation: float-text 3s ease-in-out infinite; }

        .main-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section { background: var(--card); border: 1px solid #1a1a1a; border-radius: 18px; padding: 20px; border-top: 4px solid var(--gold); }
        h2 { font-size: 18px; color: var(--gold); margin-bottom: 15px; }

        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #222; background: #000; color: white; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 16px; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-purple { background: var(--purple); color: black; }
        .btn-green { background: var(--green); color: black; }

        .list-box { background: #050505; border-radius: 10px; padding: 5px; margin-top: 15px; border: 1px solid #111; min-height: 50px; }
        .item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; font-size: 15px; }
        .debt-row { color: #ff8080 !important; font-weight: bold; }
        .del-btn { background: #2a0000; color: #ff4757; border: 1px solid #ff4757; padding: 4px 8px; border-radius: 5px; cursor: pointer; }

        .total-small { font-size: 20px; color: var(--gold); text-align: center; margin-top: 10px; font-weight: bold; }

        @keyframes rotate-led { 100% { transform: rotate(360deg); } }
        @keyframes float-text { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body onload="loadAllData()">

    <div class="led-header">
        <h1 class="moving-title">HARKI PHONE</h1>
        <div style="position:relative; z-index:2; color:#888;">سیستەمی هەمیشەیی هورکی فۆن</div>
    </div>

    <div class="main-container">
        <div class="section">
            <h2>🛠️ چاککردنەوە و ئێکسسوارات</h2>
            <select id="s1"><option>📱 چاککردنی شاشە</option><option>🔌 شوێن شەحن</option><option>🛡️ درح و بەرگ</option><option>⚡ شەحن و کێبڵ</option><option>⚙️ سۆفتوێر</option></select>
            <input type="number" id="p1" placeholder="نرخ...">
            <button class="btn btn-gold" onclick="saveItem('s1','p1','work_data','l1','t1','✅')">+ زیادکردن</button>
            <div class="list-box" id="l1"></div>
            <div class="total-small" id="t1">کۆ: 0 IQD</div>
        </div>

        <div class="section" style="border-color: var(--purple);">
            <h2 style="color: var(--purple);">💳 کارتەکان و یوسی</h2>
            <select id="s2"><option>کارتی ئاسیا</option><option>کارتی کۆڕەک</option><option>فاست لینک</option><option>یوسی پۆبجی</option><option>ئایتوونس</option></select>
            <input type="number" id="p2" placeholder="نرخ...">
            <button class="btn btn-purple" onclick="saveItem('s2','p2','card_data','l2','t2','💳')">+ زیادکردن</button>
            <div class="list-box" id="l2"></div>
            <div class="total-small" id="t2" style="color:var(--purple)">کۆ: 0 IQD</div>
        </div>

        <div class="section" style="border-color: var(--green);">
            <h2 style="color: var(--green);">💡 پارەی کارەبا</h2>
            <select id="s3"><option>کارەبای ماڵان</option><option>کارەبای دووکان</option></select>
            <input type="number" id="p3" placeholder="بڕی پارە...">
            <button class="btn btn-green" onclick="saveItem('s3','p3','elec_data','l3','t3','💡')">+ تۆمارکردن</button>
            <div class="list-box" id="l3"></div>
            <div class="total-small" id="t3" style="color:var(--green)">کۆ: 0 IQD</div>
        </div>

        <div class="section" style="border-color: var(--red);">
            <h2 style="color: var(--red);">🚩 قەردارەکان (هەمیشە سوور)</h2>
            <input type="text" id="dn" placeholder="ناوی قەردار...">
            <input type="number" id="dp" placeholder="بڕی قەرز...">
            <button class="btn" style="background:var(--red); color:white;" onclick="saveDebt()">⚠️ تۆمارکردن</button>
            <div class="list-box" id="dl"></div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <button class="btn" style="background: #111; color: #555; width: auto; padding: 10px 30px;" onclick="clearDaily()">🗑️ سفرکردنەوەی فرۆشتنەکان</button>
    </div>

    <script>
        function saveItem(idS, idP, storageKey, listId, totalId, icon) {
            let s = document.getElementById(idS).value;
            let p = document.getElementById(idP).value;
            if(!p) return;
            let data = JSON.parse(localStorage.getItem(storageKey) || "[]");
            data.push({ name: s, price: parseInt(p) });
            localStorage.setItem(storageKey, JSON.stringify(data));
            document.getElementById(idP).value = '';
            loadAllData();
        }

        function saveDebt() {
            let n = document.getElementById('dn').value;
            let p = document.getElementById('dp').value;
            if(!n || !p) return;
            let data = JSON.parse(localStorage.getItem("debt_data") || "[]");
            data.push({ name: n, price: parseInt(p) });
            localStorage.setItem("debt_data", JSON.stringify(data));
            document.getElementById('dn').value = ''; document.getElementById('dp').value = '';
            loadAllData();
        }

        function loadAllData() {
            renderList('work_data', 'l1', 't1', '✅');
            renderList('card_data', 'l2', 't2', '💳');
            renderList('elec_data', 'l3', 't3', '💡');
            renderDebt();
        }

        function renderList(key, listId, totalId, icon) {
            let data = JSON.parse(localStorage.getItem(key) || "[]");
            let list = document.getElementById(listId);
            let total = 0; list.innerHTML = "";
            data.forEach(item => {
                total += item.price;
                list.innerHTML += <div class="item-row"><span>${icon} ${item.name}</span><span>${item.price.toLocaleString()}</span></div>;
            });
            document.getElementById(totalId).innerText = "کۆ: " + total.toLocaleString() + " IQD";
        }

        function renderDebt() {
            let data = JSON.parse(localStorage.getItem("debt_data") || "[]");
            let list = document.getElementById('dl');
            list.innerHTML = "";
            data.forEach((item, index) => {
                list.innerHTML += <div class="item-row debt-row"><span>👤 ${item.name}: ${item.price.toLocaleString()}</span><button class="del-btn" onclick="deleteDebt(${index})">🗑️</button></div>;
            });
        }

        function deleteDebt(index) {
            let data = JSON.parse(localStorage.getItem("debt_data") || "[]");
            data.splice(index, 1);
            localStorage.setItem("debt_data", JSON.stringify(data));
            loadAllData();
        }

        function clearDaily() {
            if(confirm("فرۆشتنەکان سفر ببنەوە؟")) {
                localStorage.removeItem("work_data");
                localStorage.removeItem("card_data");
                localStorage.removeItem("elec_data");
                loadAllData();
            }
        }
    </script>
</body>
</html>
